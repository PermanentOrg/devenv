name: permanent

services:
  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      stela:
        condition: service_healthy
      web-app:
        condition: service_started
  web-app:
    build:
      context: ../
      dockerfile: web-app/Dockerfile.local
      args:
        FONTAWESOME_PACKAGE_TOKEN: ${FONTAWESOME_PACKAGE_TOKEN}
    command: npm run dev:docker
    image: web-app
    env_file:
      - .env
    volumes:
      - ../web-app/src:/usr/app/src:rw
  back-end:
    build:
      context: ../
      dockerfile: back-end/Dockerfile.dev
      args:
        # these args are available because of the .env file located next to the docker-compose.yml file
        # which is automatically incorporated by docker
        AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
        AWS_ACCESS_SECRET: ${AWS_ACCESS_SECRET}
        AWS_REGION: ${AWS_REGION}
        SQS_IDENT: ${SQS_IDENT}
        UPLOAD_SERVICE_SENTRY_DSN: ${UPLOAD_SERVICE_SENTRY_DSN}
        NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
        NOTIFICATION_FIREBASE_CREDENTIALS: ${NOTIFICATION_FIREBASE_CREDENTIALS}
    image: back-end
    env_file:
      # env file path is relative to docker-compose file
      # Availability of env vars at build and during run requires separate configs.
      - ./.env
    volumes:
      - ../back-end/api:/data/www/api
      - ../back-end/library:/data/www/library
      - ../back-end/daemon:/data/www/daemon
      - ../log:/var/log/permanent
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
        reservations:
          cpus: "1.0"
  stela:
    restart: always
    build:
      context: ../stela
      dockerfile: packages/api/Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ../stela/.env
    volumes:
      - ../stela/packages/api/src:/usr/local/apps/stela/packages/api/src
      - ../stela/packages/logger/src:/usr/local/apps/stela/packages/logger/src
      - ../stela/packages/archivematica_cleanup/src:/usr/local/apps/stela/packages/archivematica_cleanup/src
      - ../stela/packages/account_space_updater/src:/usr/local/apps/stela/packages/account_space_updater/src
    depends_on:
      database:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: curl http://localhost:8080/api/v2/health
  cache:
    image: memcached:1.5.6-alpine
    ports:
      - "11211:11211"
  localstack:
    image: localstack/localstack:3.0
    env_file:
      - ./.env
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns,sqs,lambda
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_DOCKER_NETWORK=permanent_default
      - LAMBDA_EXECUTOR=docker-reuse
      - LAMBDA_REMOVE_CONTAINERS=false
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
    networks:
      - default
    depends_on:
      trigger_archivematica_lambda_builder:
        condition: service_completed_successfully
      record_thumbnail_attacher_lambda_builder:
        condition: service_completed_successfully
      access_copy_attacher_lambda_builder:
        condition: service_completed_successfully
      account_space_updater_lambda_builder:
        condition: service_completed_successfully
      metadata_attacher_lambda_builder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  database:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: permanent
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U postgres -d permanent'"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
  database_setup:
    image: postgres:14-alpine
    volumes:
      - ../stela/database/base.sql:/base.sql:ro
      - ../back-end/library/db:/db:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "SELECT 'CREATE DATABASE permanent' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'permanent')\gexec" | psql postgresql://postgres:permanent@database:5432
        psql postgresql://postgres:permanent@database:5432/permanent -f /base.sql
        apk add curl
        curl -L -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/download/v1.16.0/dbmate-linux-amd64
        chmod +x /usr/local/bin/dbmate
        (dbmate --url postgresql://postgres:permanent@database:5432/permanent?sslmode=disable up)
    depends_on:
      database:
        condition: service_healthy
  trigger_archivematica_lambda_builder:
    build:
      context: ../stela
      dockerfile: packages/trigger_archivematica/Dockerfile
    image: trigger_archivematica_lambda:latest
    entrypoint: ["/bin/sh", "-c", "echo 'Lambda image built successfully' && exit 0"]
    depends_on:
      database:
        condition: service_healthy
  record_thumbnail_attacher_lambda_builder:
    build:
      context: ../stela
      dockerfile: packages/record_thumbnail_attacher/Dockerfile
    image: record_thumbnail_attacher_lambda:latest
    entrypoint: ["/bin/sh", "-c", "echo 'Lambda image built successfully' && exit 0"]
    depends_on:
      database:
        condition: service_healthy
  access_copy_attacher_lambda_builder:
    build:
      context: ../stela
      dockerfile: packages/access_copy_attacher/Dockerfile
    image: access_copy_attacher_lambda:latest
    entrypoint: ["/bin/sh", "-c", "echo 'Lambda image built successfully' && exit 0"]
    depends_on:
      database:
        condition: service_healthy
  account_space_updater_lambda_builder:
    build:
      context: ../stela
      dockerfile: packages/account_space_updater/Dockerfile
    image: account_space_updater_lambda:latest
    entrypoint: ["/bin/sh", "-c", "echo 'Lambda image built successfully' && exit 0"]
    depends_on:
      database:
        condition: service_healthy
  metadata_attacher_lambda_builder:
    build:
      context: ../stela
      dockerfile: packages/metadata_attacher/Dockerfile
    image: metadata_attacher_lambda:latest
    entrypoint: ["/bin/sh", "-c", "echo 'Lambda image built successfully' && exit 0"]
    depends_on:
      database:
        condition: service_healthy
  sqs-lambda-bridge:
    build:
      context: ./sqs-lambda-bridge
      dockerfile: Dockerfile
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-west-2}
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
volumes:
  ignore_module:
  ignore_api:
  ignore_logger:

networks:
  default:
    name: permanent_default
